services:
  - type: web
    name: rizz-server
    runtime: node
    rootDir: rizz-server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DAILY_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PORT
        value: 3001
    healthCheckPath: /health
